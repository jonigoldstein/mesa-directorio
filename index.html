<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mesa de Directorio — Jonathan</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A96E;
    --gold-light: #E8D5A3;
    --dark: #0F0E0B;
    --dark2: #1A1915;
    --dark3: #242318;
    --border: rgba(201,169,110,0.2);
    --text: #F0EDE6;
    --muted: #8A8573;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 0;
  }

  /* HEADER */
  .site-header {
    background: var(--dark2);
    border-bottom: 1px solid var(--border);
    padding: 28px 40px 24px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 20px; flex-wrap: wrap;
  }
  .site-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 24px; font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.02em;
  }
  .site-header p { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .pres-badge {
    display: flex; align-items: center; gap: 10px;
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 40px;
    padding: 8px 16px 8px 10px;
  }
  .pres-av {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--gold); color: var(--dark);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600;
  }
  .pres-badge .pn { font-size: 13px; font-weight: 500; color: var(--text); }
  .pres-badge .pr { font-size: 11px; color: var(--muted); }

  /* LAYOUT */
  .main { display: flex; height: calc(100vh - 97px); overflow: hidden; }

  /* SIDEBAR */
  .sidebar {
    width: 260px; flex-shrink: 0;
    background: var(--dark2);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px 12px;
  }
  .sidebar-title {
    font-size: 10px; font-weight: 500; letter-spacing: 0.12em;
    color: var(--muted); text-transform: uppercase;
    padding: 0 8px; margin-bottom: 10px;
  }
  .mentor-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 10px; border-radius: 8px;
    cursor: pointer; transition: background 0.15s;
    border: 1px solid transparent;
  }
  .mentor-item:hover { background: var(--dark3); }
  .mentor-item.active {
    background: rgba(201,169,110,0.1);
    border-color: rgba(201,169,110,0.3);
  }
  .m-av {
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; flex-shrink: 0;
    font-family: 'Playfair Display', serif;
  }
  .m-info .mn { font-size: 12.5px; font-weight: 500; color: var(--text); line-height: 1.3; }
  .m-info .mr { font-size: 10.5px; color: var(--muted); margin-top: 1px; line-height: 1.3; }

  /* CONTENT AREA */
  .content {
    flex: 1; overflow-y: auto;
    display: flex; flex-direction: column;
    padding: 28px 36px;
    gap: 20px;
  }

  .question-box {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .question-box label {
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); font-weight: 500; display: block; margin-bottom: 10px;
  }
  .question-box textarea {
    width: 100%; min-height: 90px; resize: vertical;
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .question-box textarea:focus { border-color: rgba(201,169,110,0.5); }
  .question-box textarea::placeholder { color: var(--muted); }

  .btn-row { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
  .btn-primary {
    background: var(--gold); color: var(--dark);
    border: none; border-radius: 8px;
    padding: 10px 22px; font-size: 13.5px; font-weight: 500;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: background 0.15s;
  }
  .btn-primary:hover { background: var(--gold-light); }
  .btn-primary:disabled { opacity: 0.4; cursor: default; }
  .btn-secondary {
    background: transparent; color: var(--gold);
    border: 1px solid rgba(201,169,110,0.4);
    border-radius: 8px;
    padding: 10px 18px; font-size: 13.5px;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .btn-secondary:hover { background: rgba(201,169,110,0.08); }
  .btn-secondary:disabled { opacity: 0.4; cursor: default; }

  /* RESPONSE */
  .response-area {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    flex: 1;
  }
  .r-placeholder {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; min-height: 200px;
    color: var(--muted); text-align: center;
  }
  .r-placeholder .icon { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }
  .r-placeholder p { font-size: 14px; }

  .r-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  .r-header .r-av { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; font-family: 'Playfair Display', serif; }
  .r-header .r-name { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--gold); }
  .r-header .r-role { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .r-text { font-size: 15px; line-height: 1.8; color: var(--text); white-space: pre-wrap; }
  .r-loading { font-size: 14px; color: var(--muted); font-style: italic; }

  /* ALL RESPONSES */
  .all-header {
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--gold); font-weight: 500; margin-bottom: 16px;
    padding-bottom: 10px; border-bottom: 1px solid var(--border);
  }
  .resp-card {
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px; margin-bottom: 12px;
  }
  .resp-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .resp-card-header .r-av { width: 34px; height: 34px; font-size: 11px; }
  .resp-card-header .r-name { font-family: 'Playfair Display', serif; font-size: 14px; color: var(--gold); }
  .resp-card-text { font-size: 13.5px; line-height: 1.75; color: #C8C4BA; white-space: pre-wrap; }

  .error-msg { font-size: 13px; color: #E07070; margin-top: 8px; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 680px) {
    .main { flex-direction: column; height: auto; }
    .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); overflow-x: auto; overflow-y: hidden; display: flex; gap: 6px; padding: 12px; }
    .sidebar-title { display: none; }
    .mentor-item { flex-direction: column; align-items: center; text-align: center; min-width: 80px; padding: 8px 6px; }
    .m-info .mn { font-size: 10px; }
    .m-info .mr { display: none; }
    .content { padding: 16px; }
    .site-header { padding: 16px; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div>
    <h1>Mesa de Directorio</h1>
    <p>Tu consejo de mentores imaginarios de negocios</p>
  </div>
  <div class="pres-badge">
    <div class="pres-av">JV</div>
    <div>
      <div class="pn">Jonathan — Presidente</div>
      <div class="pr">Arquitecto · Real Estate · Inversiones · Buenos Aires</div>
    </div>
  </div>
</header>

<div class="main">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-title">Directores</div>
  </aside>

  <div class="content">
    <div class="question-box">
      <label>Tu consulta para la mesa</label>
      <textarea id="qInput" placeholder="Ej: ¿Cómo evalúo si un terreno en Buenos Aires es una buena inversión? ¿Cómo negocio con inversores? ¿Cuándo es momento de escalar?"></textarea>
      <div class="btn-row">
        <button class="btn-primary" id="b1" onclick="ask1()">Consultar mentor seleccionado ↗</button>
        <button class="btn-secondary" id="b2" onclick="askAll()">Consultar a toda la mesa ↗</button>
      </div>
    </div>

    <div class="response-area" id="rArea">
      <div class="r-placeholder">
        <div class="icon">◈</div>
        <p>Seleccioná un mentor del panel izquierdo<br>y escribí tu consulta para comenzar.</p>
      </div>
    </div>
  </div>
</div>

<script>
const API_KEY = "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"; // ← PEGÁ TU API KEY AQUÍ: sk-ant-...

const M = [
  { i:"JR", n:"John D. Rockefeller", r:"Petróleo · monopolios · paciencia estratégica", c:"#3D2B0F", bg:"#6B4A1A",
    s:"Eres John D. Rockefeller. Hablas con frialdad estratégica, enfocado en monopolizar mercados, controlar activos clave, construir sistemas que perduren y reinvertir capital de forma implacable. Crees en la paciencia extrema y el control total de la cadena de valor." },
  { i:"AC", n:"Andrew Carnegie", r:"Acero · liderazgo · legado", c:"#2A2A2A", bg:"#555",
    s:"Eres Andrew Carnegie. Hablas sobre construir imperios con mano firme pero justa, la importancia de devolver a la sociedad y rodearse de los mejores. Crees en delegar bien y construir un legado que trascienda." },
  { i:"JP", n:"J.P. Morgan", r:"Banca · finanzas · reputación", c:"#0C2A4A", bg:"#1A5080",
    s:"Eres J.P. Morgan. Hablas desde el poder financiero absoluto. Para ti, el dinero mueve el mundo y la confianza es el activo más valioso. Piensas en consolidaciones, control y en la reputación como moneda." },
  { i:"CV", n:"Cornelius Vanderbilt", r:"Infraestructura · velocidad · activos físicos", c:"#3D1A0A", bg:"#7A3515",
    s:"Eres Cornelius Vanderbilt. Eres directo, duro y competitivo. Crees que hay que entrar primero, moverse rápido y dominar. Valoras la infraestructura y los activos físicos por encima de todo." },
  { i:"HF", n:"Henry Ford", r:"Sistemas · escala · eficiencia", c:"#073A1A", bg:"#0F6B30",
    s:"Eres Henry Ford. Crees en la producción en escala, los sistemas eficientes y democratizar productos. Para ti, el éxito viene de simplificar procesos hasta el hueso y pensar en millones de clientes." },
  { i:"DC", n:"Dale Carnegie", r:"Influencia · relaciones · ventas", c:"#1A3A0A", bg:"#3A7015",
    s:"Eres Dale Carnegie. Tu enfoque son las relaciones humanas, la persuasión y ganar aliados. Crees que el éxito empresarial depende 85% de habilidades interpersonales y 15% de conocimiento técnico." },
  { i:"CH", n:"Conrad Hilton", r:"Visión · expansión · comprar en crisis", c:"#3A2A0A", bg:"#705020",
    s:"Eres Conrad Hilton. Eres hotelero y hombre de fe. Crees en la visión a largo plazo, comprar activos en las crisis y construir marca. Pasaste de la quiebra al hotel más grande del mundo." },
  { i:"AO", n:"Aristóteles Onassis", r:"Intuición · riesgo · activos reales", c:"#3A1A10", bg:"#703020",
    s:"Eres Aristóteles Onassis. Maestro de la intuición, el riesgo calculado y las relaciones de poder. Pensas en activos físicos que generen flujo. Eres un negociador nato que juega en múltiples tableros a la vez." },
  { i:"RK", n:"Ray Kroc", r:"Sistemas replicables · perseverancia · real estate", c:"#3A1A1A", bg:"#802020",
    s:"Eres Ray Kroc. Crees en los sistemas replicables y la estandarización como camino a la escala. Encontraste tu gran oportunidad a los 52 años. Sabes que el real estate es el negocio real detrás del negocio." },
  { i:"WC", n:"Winston Churchill", r:"Liderazgo · crisis · comunicación", c:"#0A1A3A", bg:"#1A3A7A",
    s:"Eres Winston Churchill. Hablas con elocuencia y convicción. Crees en liderar desde el frente en las crisis, comunicar con claridad y valentía, y en que el carácter se forja en las dificultades. Nunca rendirse." },
  { i:"EM", n:"Elon Musk", r:"Primeros principios · riesgo extremo · velocidad", c:"#073A30", bg:"#0F6B5A",
    s:"Eres Elon Musk. Pensas desde primeros principios, cuestionás todo y apostás fuerte. Para ti, pensar en pequeño es el error fatal y la velocidad de ejecución es tu mayor ventaja competitiva." },
  { i:"WB", n:"Warren Buffett", r:"Value investing · paciencia · interés compuesto", c:"#1A3A0A", bg:"#356B15",
    s:"Eres Warren Buffett. Hablas con simplicidad y humor. Crees en el value investing, la paciencia, el círculo de competencia y no hacer lo que no entendés. Amás los negocios con ventaja competitiva duradera." },
  { i:"RR", n:"Ronald Reagan", r:"Comunicación · optimismo · liderazgo inspirador", c:"#3A0A20", bg:"#7A1540",
    s:"Eres Ronald Reagan. Eres optimista y comunicador nato. Crees en el poder de la visión positiva para movilizar personas. Para ti, liderar es inspirar. El mercado libre y la fe en el futuro son tus pilares." },
  { i:"AL", n:"Abraham Lincoln", r:"Resiliencia · integridad · largo plazo", c:"#2A2A2A", bg:"#4A4A4A",
    s:"Eres Abraham Lincoln. Eres paciente, moral, resiliente y de visión de largo plazo. Crees que los grandes líderes actúan con integridad bajo presión extrema y que rodearse de los mejores es clave para el éxito." },
  { i:"BF", n:"Benjamin Franklin", r:"Ingenio · diplomacia · mejora continua", c:"#3A2A0A", bg:"#6A5010",
    s:"Eres Benjamin Franklin. Eres autodidacta, pragmático y diplomático. Crees en la virtud práctica, la mejora continua, el networking estratégico y que las ideas bien comunicadas mueven el mundo." },
];

const CTX = `\n\nEstás en una mesa de directorio imaginaria presidida por Jonathan, un arquitecto argentino de Buenos Aires que está iniciando en desarrollos inmobiliarios y tiene junto a su padre una prestigiosa empresa inmobiliaria en la ciudad. También es apasionado por inversiones en el mercado de valores.\n\nRespondé SIEMPRE en español. Tu respuesta debe sonar auténtica a tu voz y personalidad histórica real. Sé directo, específico y útil para su situación. Podés usar anécdotas o principios de tu vida real. Máximo 4 párrafos. Sin asteriscos ni markdown, solo texto plano. Firmá al final con tu nombre.`;

let selIdx = null;

// Build sidebar
const sidebar = document.getElementById("sidebar");
M.forEach((m, idx) => {
  const el = document.createElement("div");
  el.className = "mentor-item";
  el.id = "mi" + idx;
  el.innerHTML = `<div class="m-av" style="background:${m.bg};color:#F0EDE6">${m.i}</div><div class="m-info"><div class="mn">${m.n}</div><div class="mr">${m.r}</div></div>`;
  el.onclick = () => {
    document.querySelectorAll(".mentor-item").forEach(x => x.classList.remove("active"));
    el.classList.add("active");
    selIdx = idx;
  };
  sidebar.appendChild(el);
});

async function callAPI(sysPrompt, userMsg, maxTok) {
  if (!API_KEY) throw new Error("API Key vacía. Abrí el archivo HTML, buscá la línea 'const API_KEY' y pegá tu clave sk-ant-...");
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
  "Content-Type": "application/json",
  "x-api-key": API_KEY,
  "anthropic-version": "2023-06-01",
  "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-5",
      max_tokens: maxTok || 900,
      system: sysPrompt + CTX,
      messages: [{ role: "user", content: userMsg }]
    })
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw new Error(err.error?.message || "HTTP " + r.status);
  }
  const d = await r.json();
  return (d.content || []).map(c => c.text || "").join("");
}

function setBtns(on) {
  document.getElementById("b1").disabled = !on;
  document.getElementById("b2").disabled = !on;
}

function timestamp() {
  return new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
}

function initHistory() {
  const ra = document.getElementById("rArea");
  ra.innerHTML = `
    <div id="historyEmpty" class="r-placeholder"><div class="icon">◈</div><p>Seleccioná un mentor del panel izquierdo<br>y escribí tu consulta para comenzar.</p></div>
    <div id="historyLog"></div>
    <div id="clearRow" style="display:none;text-align:right;margin-top:12px">
      <button onclick="clearHistory()" style="background:transparent;border:1px solid rgba(201,169,110,0.3);color:var(--muted);border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif">Limpiar historial</button>
    </div>`;
}
initHistory();

function appendEntry(html) {
  document.getElementById("historyEmpty").style.display = "none";
  document.getElementById("clearRow").style.display = "block";
  const log = document.getElementById("historyLog");
  const div = document.createElement("div");
  div.innerHTML = html;
  log.appendChild(div);
  div.scrollIntoView({ behavior: "smooth", block: "start" });
  return div;
}

function clearHistory() {
  initHistory();
}

async function ask1() {
  const q = document.getElementById("qInput").value.trim();
  if (!q) { alert("Escribí tu consulta primero."); return; }
  if (selIdx === null) { alert("Seleccioná un mentor del panel izquierdo."); return; }
  const m = M[selIdx];
  setBtns(false);

  const rId = "r_" + Date.now();
  appendEntry(`
    <div style="margin-bottom:6px;padding:10px 14px;background:rgba(201,169,110,0.07);border-radius:8px;border-left:3px solid var(--gold)">
      <span style="font-size:11px;color:var(--muted);letter-spacing:0.08em">VOS · ${timestamp()}</span>
      <div style="font-size:14px;color:var(--text);margin-top:4px">${q}</div>
    </div>
    <div id="${rId}" style="margin-bottom:22px">
      <div class="r-header" style="margin-bottom:10px">
        <div class="r-av" style="background:${m.bg};color:#F0EDE6;width:38px;height:38px;font-size:12px">${m.i}</div>
        <div><div class="r-name">${m.n}</div><div class="r-role" style="font-size:11px;color:var(--muted)">${m.r}</div></div>
      </div>
      <div class="r-loading" id="${rId}_txt">Pensando...</div>
    </div>`);

  try {
    const txt = await callAPI(m.s, q, 950);
    const el = document.getElementById(rId + "_txt");
    if (el) { el.className = "r-text"; el.textContent = txt; }
  } catch(e) {
    const el = document.getElementById(rId + "_txt");
    if (el) el.innerHTML = `<span class="error-msg">⚠ ${e.message}</span>`;
  }
  setBtns(true);
}

async function askAll() {
  const q = document.getElementById("qInput").value.trim();
  if (!q) { alert("Escribí tu consulta primero."); return; }
  setBtns(false);

  appendEntry(`
    <div style="margin-bottom:10px;padding:10px 14px;background:rgba(201,169,110,0.07);border-radius:8px;border-left:3px solid var(--gold)">
      <span style="font-size:11px;color:var(--muted);letter-spacing:0.08em">VOS · ${timestamp()} · SESIÓN PLENARIA</span>
      <div style="font-size:14px;color:var(--text);margin-top:4px">${q}</div>
    </div>`);

  const log = document.getElementById("historyLog");
  const groupDiv = document.createElement("div");
  groupDiv.style.marginBottom = "24px";
  log.appendChild(groupDiv);

  for (const m of M) {
    const card = document.createElement("div");
    card.className = "resp-card";
    card.style.marginBottom = "10px";
    const tid = "rt_" + m.i + "_" + Date.now();
    card.innerHTML = `<div class="resp-card-header"><div class="r-av" style="background:${m.bg};color:#F0EDE6">${m.i}</div><div><div class="r-name">${m.n}</div></div></div><div class="resp-card-text" id="${tid}">Respondiendo...</div>`;
    groupDiv.appendChild(card);
    card.scrollIntoView({ behavior: "smooth", block: "nearest" });
    try {
      const txt = await callAPI(m.s, q, 420);
      document.getElementById(tid).textContent = txt;
    } catch(e) {
      document.getElementById(tid).innerHTML = `<span style="color:#E07070">⚠ ${e.message}</span>`;
    }
  }
  setBtns(true);
}
</script>
</body>
</html>
